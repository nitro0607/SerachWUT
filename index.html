<!DOCTYPE html>
<html lang="zh">
<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>SearchWUT</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

<div class="container">

  <!-- 标题 -->
  <h1 class="main-title">
    SearchWUT
  </h1>

  <p class="sub-title">
    AI智能校园搜索平台
  </p>


  <!-- 校园资讯 -->
  <section class="card">

    <h2>🏫 校园资讯</h2>

    <div id="news-list">

      正在加载校园资讯...

    </div>

  </section>


  <!-- 新增：校内公告 -->
  <section class="card">

    <h2>📢 校内公告</h2>

    <div id="notice-list">

      正在加载校内公告...

    </div>

  </section>


  <!-- URL分析 -->
  <section class="card">

    <h2>🌐 URL网页分析</h2>

    <div class="input-group">

      <input
        type="text"
        id="url-input"
        placeholder="输入网页URL"
      >

      <button onclick="analyzeUrl()">
        分析
      </button>

    </div>

    <div id="url-result"></div>

  </section>


  <!-- AI聊天 -->
  <section class="card">

    <h2>🤖 AI聊天</h2>

    <div class="chat-box" id="chat-box">

    </div>

    <div class="input-group">

      <input
        type="text"
        id="chat-input"
        placeholder="输入问题..."
      >

      <button onclick="sendMessage()">
        发送
      </button>

    </div>

  </section>


  <!-- 页脚 -->
  <footer>

    <p>
      👨‍💻 Nitro0607
    </p>

    <p>
      📧
      <a href="mailto:1295422173@qq.com">
        1295422173@qq.com
      </a>
    </p>

    <p>
      💻
      <a
        href="https://github.com/nitro0607"
        target="_blank"
      >
        GitHub
      </a>
    </p>

    <p style="margin-top:10px;color:#888;">
      © 2026 SearchWUT
    </p>

  </footer>

</div>

<script src="script.js"></script>

</body>
</html>
