<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>SearchWUT</title>

  <style>
    body {
      font-family: Arial;
      max-width: 1000px;
      margin: 40px auto;
    }

    .container {
      display: flex;
      gap: 20px;
    }

    .panel {
      flex: 1;
      background: #f5f5f5;
      padding: 15px;
      border-radius: 10px;
    }

    input {
      width: 70%;
      padding: 8px;
    }

    button {
      padding: 8px 15px;
    }

    .result {
      margin-top: 10px;
      height: 300px;
      overflow-y: auto;
      white-space: pre-wrap;
      background: #fff;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h1>🔍 SearchWUT</h1>

<div class="container">

  <!-- 🌐 网页总结 -->
  <div class="panel">
    <h2>🌐 网页总结</h2>
    <input id="urlInput" placeholder="输入网页URL..." />
    <button onclick="summarize()">分析</button>
    <div id="result1" class="result"></div>
  </div>

  <!-- 💬 聊天 -->
  <div class="panel">
    <h2>💬 AI聊天</h2>
    <input id="chatInput" placeholder="输入问题..." />
    <button onclick="chat()">发送</button>
    <div id="result2" class="result"></div>
  </div>

</div>

<script>
const API_BASE = "https://test-1-5r5k.onrender.com";

// =====================
// 🌐 网页总结
// =====================
async function summarize() {
  const input = document.getElementById("urlInput").value.trim();
  const result = document.getElementById("result1");

  result.innerText = "🧠 分析中...\n";

  const res = await fetch(API_BASE + "/api/summarize", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ url: input })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  result.innerText = "";

  while (true) {
    const {done, value} = await reader.read();
    if (done) break;
    result.innerText += decoder.decode(value);
  }
}


// =====================
// 💬 多轮聊天
// =====================
let messages = [
  { role: "system", content: "你是一个AI助手" }
];

async function chat() {
  const input = document.getElementById("chatInput");
  const result = document.getElementById("result2");

  const text = input.value.trim();
  if (!text) return;

  messages.push({ role: "user", content: text });

  result.innerText += "\n👤：" + text + "\n🤖：";

  input.value = "";

  const res = await fetch(API_BASE + "/api/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ messages: messages })
  });

  const reader = res.body.getReader();
  const decoder = new TextDecoder();

  let reply = "";

  while (true) {
    const {done, value} = await reader.read();
    if (done) break;

    const chunk = decoder.decode(value);
    reply += chunk;
    result.innerText += chunk;
  }

  messages.push({ role: "assistant", content: reply });
  result.innerText += "\n\n";
}
</script>

</body>
</html>
